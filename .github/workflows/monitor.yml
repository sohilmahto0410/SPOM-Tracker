name: ICAI Slot Monitor

on:
  schedule:
    # Runs every 15 minutes. 
    # GitHub limits cron frequency to ~every 5-15 mins max.
    - cron: '*/15 * * * *'
  workflow_dispatch: 
    # Allows you to run it manually from the Actions tab

jobs:
  check-slots:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore cache for seen slots
        uses: actions/cache/restore@v4
        id: restore-cache
        with:
          path: seen_slots_cache.json
          key: seen-slots-${{ github.run_id }}
          restore-keys: |
            seen-slots-

      - name: Run slot checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_VALUE: ${{ secrets.STATE_VALUE }}
          STATE_TEXT: ${{ secrets.STATE_TEXT }}
          CITY_VALUE: ${{ secrets.CITY_VALUE }}
          CITY_TEXT: ${{ secrets.CITY_TEXT }}
          CENTRE_VALUE: ${{ secrets.CENTRE_VALUE }}
          CENTRE_TEXT: ${{ secrets.CENTRE_TEXT }}
        run: python check_slots.py

      - name: Save cache for seen slots
        uses: actions/cache/save@v4
        if: always() # Save cache even if script fails, to not lose data
        with:
          path: seen_slots_cache.json
          # Use a dynamic key so we always save a new cache version
          key: seen-slots-${{ github.run_id }}
